<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>SteamBaratoChile</title>

<style>
:root{--bg:#0b0f19;--card:#111827;--muted:#9ca3af;--text:#e5e7eb;--line:rgba(255,255,255,.08);--good:#16a34a;--bad:#dc2626;}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}

.header{
text-align:center;
padding:40px 20px 10px 20px;
}

.logo{
width:120px;
height:auto;
margin-bottom:15px;
}

.welcome{
font-size:24px;
font-weight:bold;
margin-bottom:5px;
}

.subtitle{
color:var(--muted);
margin-bottom:30px;
}

/* ✅ Layout tipo "app" para que el teclado no tape contenido */
.wrap{
max-width:1100px;
margin:auto;
padding:20px;
min-height:100vh;
display:flex;
flex-direction:column;
gap:20px;
}

.card{background:var(--card);padding:20px;border-radius:16px;border:1px solid var(--line)}

/* ✅ FIX: evitar zoom en iPhone/Android al tocar el input */
input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid var(--line);
background:#111;
color:white;
margin-bottom:10px;
font-size:16px; /* <- clave */
}

/* ✅ Resultados con scroll propio (el teclado no los tapa) */
#results{
max-height:40vh;
overflow-y:auto;
margin-top:10px;
}

.result{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.result span:first-child{flex:1}

.good{color:#22c55e;font-weight:bold}
.bad{color:#ef4444;font-weight:bold}

button{background:#1f2937;border:1px solid var(--line);color:white;padding:6px 10px;border-radius:8px;cursor:pointer}
button:hover{background:#374151}

.cart-item{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--line)}
.cart-item span{flex:1}

/* 🛒 Botón flotante arriba a la derecha */
.cart-fab{
position:fixed;
top:14px;
right:14px;
z-index:1000;
width:44px;
height:44px;
border-radius:14px;
display:inline-flex;
align-items:center;
justify-content:center;
background:#1f2937;
border:1px solid var(--line);
color:white;
cursor:pointer;
}
.cart-fab:hover{background:#374151}
.cart-badge{
position:absolute;
top:-6px;
right:-6px;
min-width:18px;
height:18px;
padding:0 5px;
border-radius:999px;
display:inline-flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:700;
background:#ef4444;
color:white;
border:1px solid rgba(0,0,0,.35);
}

/* Drawer del carrito */
.cart-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
opacity:0;
pointer-events:none;
transition:opacity .2s ease;
z-index:1001;
}

.cart-drawer{
position:fixed;
top:0;
right:0;
height:100vh;
width:min(92vw, 380px);
background:var(--card);
border-left:1px solid var(--line);
transform:translateX(100%);
transition:transform .25s ease;
z-index:1002;
display:flex;
flex-direction:column;
padding:16px;
gap:12px;
}

.cart-drawer.open{transform:translateX(0)}
.cart-overlay.open{opacity:1; pointer-events:auto}

.cart-drawer-header{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
}

.cart-close{
width:36px;
height:36px;
border-radius:10px;
display:inline-flex;
align-items:center;
justify-content:center;
padding:0;
}

.cart-content{
overflow:auto;
flex:1;
border-top:1px solid var(--line);
padding-top:10px;
}
.cart-actions{display:flex;gap:10px;flex-wrap:wrap}

/* 📷 Instagram abajo (centrado) */
.ig-footer{
  margin-top:auto;
  padding:18px 0 10px;
  display:flex;
  justify-content:center;
}
.ig-link{
  width:48px;
  height:48px;
  border-radius:14px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:#1f2937;
  border:1px solid var(--line);
  color:white;
  text-decoration:none;
}
.ig-link:hover{background:#374151}
.ig-link svg{width:22px;height:22px}

/* 🎮 Vista de juego (imagen + texto) */
.game-row{
  display:flex;
  gap:10px;
  align-items:flex-start;
}
.game-row img{
  width:92px;
  height:auto;
  border-radius:10px;
  border:1px solid var(--line);
}
.game-title{font-weight:600}
.game-desc{color:var(--muted);font-size:13px;line-height:1.25;margin-top:2px}
.game-link{color:#93c5fd;font-size:13px;text-decoration:none}
.game-link:hover{text-decoration:underline}

</style>
</head>

<body>

<div class="header">
<img src="logo.png" class="logo" alt="Logo">
<div class="welcome">Bienvenido a @steambaratochile</div>
<div class="subtitle">Busca tus juegos favoritos y agrégalos al carrito</div>
</div>

<div class="wrap">

<div class="card">
<input id="search" placeholder="Buscar juego...">
<div id="results"></div>
</div>

<!-- 📷 Instagram abajo -->
<div class="ig-footer">
  <a class="ig-link"
     href="https://www.instagram.com/steambaratochile/"
     target="_blank"
     rel="noopener"
     aria-label="Instagram @steambaratochile"
     title="Instagram">
    <!-- Icono Instagram (SVG) -->
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M7.5 2.75h9A4.75 4.75 0 0 1 21.25 7.5v9A4.75 4.75 0 0 1 16.5 21.25h-9A4.75 4.75 0 0 1 2.75 16.5v-9A4.75 4.75 0 0 1 7.5 2.75Z" stroke="currentColor" stroke-width="1.8"/>
      <path d="M12 16.2a4.2 4.2 0 1 0 0-8.4 4.2 4.2 0 0 0 0 8.4Z" stroke="currentColor" stroke-width="1.8"/>
      <path d="M17.3 6.9h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </a>
</div>

</div>

<!-- 🛒 Botón flotante del carrito (arriba a la derecha) -->
<button class="cart-fab" id="cartBtn" aria-label="Abrir carrito" title="Carrito">
  ☰
  <span class="cart-badge" id="cartCount" style="display:none">0</span>
</button>

<!-- Fondo oscuro -->
<div class="cart-overlay" id="cartOverlay"></div>

<!-- Drawer del carrito -->
<aside class="cart-drawer" id="cartDrawer" aria-label="Carrito">
  <div class="cart-drawer-header">
    <h3 style="margin:0">🛒 Carrito</h3>
    <button class="cart-close" id="cartClose" aria-label="Cerrar carrito" title="Cerrar">✕</button>
  </div>
  <div class="cart-content">
    <div id="cart"></div>
  </div>
  <div class="cart-actions">
    <button onclick="clearCart()">Vaciar carrito</button>
  </div>
</aside>

const search = document.getElementById("search");
const results = document.getElementById("results");
const cartDiv = document.getElementById("cart");

const cartBtn = document.getElementById("cartBtn");
const cartCount = document.getElementById("cartCount");
const cartDrawer = document.getElementById("cartDrawer");
const cartOverlay = document.getElementById("cartOverlay");
const cartClose = document.getElementById("cartClose");

let cartOpen = JSON.parse(localStorage.getItem("cartOpen") || "false");
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function saveCart(){localStorage.setItem("cart", JSON.stringify(cart));}
function saveCartOpen(){localStorage.setItem("cartOpen", JSON.stringify(cartOpen));}

function openCart(){
  cartOpen = true;
  saveCartOpen();
  cartDrawer.classList.add("open");
  cartOverlay.classList.add("open");
}
function closeCart(){
  cartOpen = false;
  saveCartOpen();
  cartDrawer.classList.remove("open");
  cartOverlay.classList.remove("open");
}
function toggleCart(){ cartOpen ? closeCart() : openCart(); }

cartBtn.addEventListener("click", toggleCart);
cartClose.addEventListener("click", closeCart);
cartOverlay.addEventListener("click", closeCart);

function renderCart(){
  if(cart.length>0){cartCount.style.display="inline-flex";cartCount.textContent=String(cart.length);}
  else{cartCount.style.display="none";}

  if(cart.length===0){cartDiv.innerHTML="<p>Carrito vacío</p>";return;}
  cartDiv.innerHTML = cart.map((g,i)=>`
<div class="cart-item">
<span>${g}</span>
<button onclick="removeFromCart(${i})">Quitar</button>
</div>`).join("");
}

function removeFromCart(i){cart.splice(i,1);saveCart();renderCart();}
function clearCart(){cart=[];saveCart();renderCart();}

function addToCart(name){
  if(cart.includes(name)) return;
  cart.push(name);
  saveCart();
  renderCart();
}

/* ---------------- STEAM (imagen + descripción) ---------------- */

const STEAM_CACHE_KEY = "steamCacheV1";
let steamCache = JSON.parse(localStorage.getItem(STEAM_CACHE_KEY) || "{}");
function saveSteamCache(){ localStorage.setItem(STEAM_CACHE_KEY, JSON.stringify(steamCache)); }

async function steamSearch(term){
  const url = `https://store.steampowered.com/api/storesearch/?term=${encodeURIComponent(term)}&l=spanish&cc=cl`;
  const r = await fetch(url);
  if(!r.ok) throw new Error("Steam search failed");
  return r.json();
}

async function steamDetails(appid){
  const url = `https://store.steampowered.com/api/appdetails?appids=${appid}&l=spanish&cc=cl`;
  const r = await fetch(url);
  if(!r.ok) throw new Error("Steam details failed");
  const json = await r.json();
  return json[String(appid)]?.data;
}

async function getSteamInfoByName(name){
  if (steamCache[name] !== undefined) return steamCache[name];

  const s = await steamSearch(name);
  const first = s?.items?.[0];
  if(!first?.id){
    steamCache[name] = null;
    saveSteamCache();
    return null;
  }

  const data = await steamDetails(first.id);
  if(!data){
    steamCache[name] = null;
    saveSteamCache();
    return null;
  }

  const info = {
    appid: first.id,
    title: data.name || name,
    image: data.header_image || "",
    desc: (data.short_description || "").replace(/<[^>]*>/g, ""),
    url: `https://store.steampowered.com/app/${first.id}/`
  };

  steamCache[name] = info;
  saveSteamCache();
  return info;
}

function escapeHtml(s){
  return String(s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* ---------------- BUSCADOR ---------------- */

let searchToken = 0;

search.addEventListener("input", async ()=>{
  const q = search.value.toLowerCase();
  if(!q){ results.innerHTML=""; return; }

  const token = ++searchToken;

  const filtered = GAMES.filter(g=>g.name.toLowerCase().includes(q)).slice(0,30);

  // Pintado inicial rápido
  results.innerHTML = filtered.map(g=>`
<div class="result" style="align-items:flex-start">
  <span>
    <div class="game-title">${escapeHtml(g.name)}</div>
    <div class="game-desc">Cargando imagen y descripción...</div>
  </span>
  <span>
    <span class="${g.available ? "good":"bad"}">${g.available ? "DISPONIBLE":"NO DISPONIBLE"}</span>
    ${g.available ? `<button onclick="addToCart('${g.name.replace(/'/g,"\\'")}')">Agregar</button>` : ""}
  </span>
</div>`).join("");

  // Enriquecer con Steam
  const enriched = await Promise.all(filtered.map(async g=>{
    try{
      const info = await getSteamInfoByName(g.name);
      return { ...g, info };
    }catch(e){
      return { ...g, info: null };
    }
  }));

  // Si el usuario siguió escribiendo, cancelamos este render
  if (token !== searchToken) return;

  results.innerHTML = enriched.map(g=>{
    const title = escapeHtml(g.info?.title || g.name);
    const desc = escapeHtml(g.info?.desc || "Sin descripción (no encontrada).");
    const img = g.info?.image ? `<img src="${g.info.image}" alt="${title}">` : "";
    const link = g.info?.url ? `<a class="game-link" href="${g.info.url}" target="_blank" rel="noopener">Ver en Steam</a>` : "";

    return `
<div class="result" style="align-items:flex-start; gap:12px">
  <span class="game-row">
    ${img}
    <span>
      <div class="game-title">${title}</div>
      <div class="game-desc">${desc}</div>
      ${link}
    </span>
  </span>
  <span>
    <span class="${g.available ? "good":"bad"}">${g.available ? "DISPONIBLE":"NO DISPONIBLE"}</span>
    ${g.available ? `<button onclick="addToCart('${g.name.replace(/'/g,"\\'")}')">Agregar</button>` : ""}
  </span>
</div>`;
  }).join("");
});

renderCart();
if(cartOpen) openCart();
</script>
