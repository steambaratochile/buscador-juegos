<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>SteamBaratoChile</title>

  <style>
    :root{--bg:#0b0f19;--card:#111827;--muted:#9ca3af;--text:#e5e7eb;--line:rgba(255,255,255,.08);--good:#16a34a;--bad:#dc2626;}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}

    .header{ text-align:center; padding:40px 20px 10px 20px; }
    .logo{ width:120px; height:auto; margin-bottom:15px; }
    .welcome{ font-size:24px; font-weight:bold; margin-bottom:5px; }
    .subtitle{ color:var(--muted); margin-bottom:30px; }

    .wrap{
      max-width:1100px;
      margin:auto;
      padding:20px;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      gap:20px;
      padding-bottom:90px;
    }

    .card{background:var(--card);padding:20px;border-radius:16px;border:1px solid var(--line)}

    input{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#111;
      color:white;
      margin-bottom:10px;
      font-size:16px;
    }

    #results{
      max-height:40vh;
      overflow-y:auto;
      margin-top:10px;
    }

    .result{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);align-items:center}
    .result span:first-child{flex:1}

    .good{color:#22c55e;font-weight:bold}
    .bad{color:#ef4444;font-weight:bold}

    button{background:#1f2937;border:1px solid var(--line);color:white;padding:6px 10px;border-radius:8px;cursor:pointer}
    button:hover{background:#374151}

    .cart-item{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--line)}
    .cart-item span{flex:1}

    .cart-fab{
      position:fixed; top:14px; right:14px; z-index:1000;
      width:44px; height:44px; border-radius:14px;
      display:inline-flex; align-items:center; justify-content:center;
      background:#1f2937; border:1px solid var(--line); color:white; cursor:pointer;
    }
    .cart-fab:hover{background:#374151}
    .cart-fab svg{width:22px;height:22px}
    .cart-badge{
      position:absolute; top:-6px; right:-6px;
      min-width:18px; height:18px; padding:0 5px; border-radius:999px;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700;
      background:#ef4444; color:white; border:1px solid rgba(0,0,0,.35);
    }

    .cart-overlay{
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      opacity:0; pointer-events:none; transition:opacity .2s ease; z-index:1001;
    }

    .cart-drawer{
      position:fixed; top:0; right:0; height:100vh; width:min(92vw, 380px);
      background:var(--card); border-left:1px solid var(--line);
      transform:translateX(100%); transition:transform .25s ease;
      z-index:1002; display:flex; flex-direction:column; padding:16px; gap:12px;
    }

    .cart-drawer.open{transform:translateX(0)}
    .cart-overlay.open{opacity:1; pointer-events:auto}

    .cart-drawer-header{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .cart-close{width:36px;height:36px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;padding:0}
    .cart-content{overflow:auto;flex:1;border-top:1px solid var(--line);padding-top:10px}
    .cart-actions{display:flex;gap:10px;flex-wrap:wrap}

    .ig-footer{
      position:fixed; left:0; right:0; bottom:12px;
      display:flex; justify-content:center; z-index:1003;
      pointer-events:none;
    }
    .ig-link{
      pointer-events:auto;
      width:48px; height:48px; border-radius:14px;
      display:inline-flex; align-items:center; justify-content:center;
      background:#1f2937; border:1px solid var(--line);
      color:white; text-decoration:none;
    }
    .ig-link:hover{background:#374151}
    .ig-link svg{width:22px;height:22px}

    .toast{
      position:fixed; left:50%; bottom:80px; transform:translateX(-50%) translateY(20px);
      background:#111827; color:white; border:1px solid rgba(255,255,255,.1);
      padding:10px 16px; border-radius:10px; font-size:14px;
      opacity:0; pointer-events:none; transition:all .25s ease; z-index:2000;
    }
    .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

    /* ✅ Imagen en resultados */
    .game-left{display:flex;align-items:center;gap:10px;min-width:0}
    .game-cover{
      width:54px;height:54px;flex:0 0 54px;
      object-fit:cover;border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      background:#0f172a;
    }
    .game-placeholder{
      width:54px;height:54px;flex:0 0 54px;
      border-radius:10px;border:1px solid rgba(255,255,255,.08);
      background:#0f172a;
    }
    .game-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  </style>
</head>

<body>

  <div class="header">
    <img src="logo.png" class="logo" alt="Logo">
    <div class="welcome">Bienvenido a @steambaratochile</div>
    <div class="subtitle">Busca tus juegos favoritos y agrégalos al carrito</div>
  </div>

  <div class="wrap">
    <div class="card">
      <input id="search" placeholder="Buscar juego...">
      <div id="results"></div>
    </div>
  </div>

  <!-- 🛒 Botón flotante -->
  <button class="cart-fab" id="cartBtn" aria-label="Abrir carrito" title="Carrito">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M6.5 6.5h14l-1.6 7.2a2 2 0 0 1-2 1.6H9.2a2 2 0 0 1-2-1.6L5.4 3.8H3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9.5 20a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Z" fill="currentColor"/>
      <path d="M17.5 20a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Z" fill="currentColor"/>
    </svg>
    <span class="cart-badge" id="cartCount" style="display:none">0</span>
  </button>

  <div class="cart-overlay" id="cartOverlay"></div>

  <aside class="cart-drawer" id="cartDrawer" aria-label="Carrito">
    <div class="cart-drawer-header">
      <h3 style="margin:0">🛒 Carrito</h3>
      <button class="cart-close" id="cartClose" aria-label="Cerrar carrito" title="Cerrar">✕</button>
    </div>
    <div class="cart-content">
      <div id="cart"></div>
    </div>
    <div class="cart-actions">
      <button onclick="clearCart()">Vaciar carrito</button>
    </div>
  </aside>

  <div class="ig-footer">
    <a class="ig-link"
       href="https://www.instagram.com/steambaratochile/"
       target="_blank"
       rel="noopener"
       aria-label="Instagram @steambaratochile"
       title="Instagram">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M7.5 2.75h9A4.75 4.75 0 0 1 21.25 7.5v9A4.75 4.75 0 0 1 16.5 21.25h-9A4.75 4.75 0 0 1 2.75 16.5v-9A4.75 4.75 0 0 1 7.5 2.75Z" stroke="currentColor" stroke-width="1.8"/>
        <path d="M12 16.2a4.2 4.2 0 1 0 0-8.4 4.2 4.2 0 0 0 0 8.4Z" stroke="currentColor" stroke-width="1.8"/>
        <path d="M17.3 6.9h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </a>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // ========= CONFIG =========
    const API_URL = "https://script.google.com/macros/s/AKfycbxKQgmgn16lNofJbtyMg_s3gjOD4tTo_BjRP70RbtuoucijvV0vsYtTk2yUlsg-RfEq/exec";

    // ========= STATE =========
    let GAMES = [];

    const search = document.getElementById("search");
    const results = document.getElementById("results");
    const cartDiv = document.getElementById("cart");

    const cartBtn = document.getElementById("cartBtn");
    const cartCount = document.getElementById("cartCount");
    const cartDrawer = document.getElementById("cartDrawer");
    const cartOverlay = document.getElementById("cartOverlay");
    const cartClose = document.getElementById("cartClose");

    let cartOpen = JSON.parse(localStorage.getItem("cartOpen") || "false");
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");

    function saveCart(){ localStorage.setItem("cart", JSON.stringify(cart)); }
    function saveCartOpen(){ localStorage.setItem("cartOpen", JSON.stringify(cartOpen)); }

    function openCart(){
      cartOpen = true; saveCartOpen();
      cartDrawer.classList.add("open");
      cartOverlay.classList.add("open");
    }
    function closeCart(){
      cartOpen = false; saveCartOpen();
      cartDrawer.classList.remove("open");
      cartOverlay.classList.remove("open");
    }
    function toggleCart(){ cartOpen ? closeCart() : openCart(); }

    cartBtn.addEventListener("click", toggleCart);
    cartClose.addEventListener("click", closeCart);
    cartOverlay.addEventListener("click", closeCart);

    function showToast(msg){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(()=>t.classList.remove("show"), 2000);
    }

    function renderCart(){
      if(cart.length>0){
        cartCount.style.display="inline-flex";
        cartCount.textContent=String(cart.length);
      }else{
        cartCount.style.display="none";
      }

      if(cart.length===0){
        cartDiv.innerHTML="<p>Carrito vacío</p>";
        return;
      }
      cartDiv.innerHTML = cart.map((g,i)=>`
        <div class="cart-item">
          <span>${escapeHtml(g)}</span>
          <button onclick="removeFromCart(${i})">Quitar</button>
        </div>
      `).join("");
    }

    function removeFromCart(i){
      cart.splice(i,1);
      saveCart();
      renderCart();
      showToast("Juego eliminado del carrito");
    }
    function clearCart(){
      cart = [];
      saveCart();
      renderCart();
      showToast("Carrito vaciado");
    }

    function addToCart(name){
      if(cart.includes(name)) return;
      cart.push(name);
      showToast("Juego agregado al carrito");
      saveCart();
      renderCart();
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    // ========= CARGA DESDE SHEETS =========
    async function loadGames(){
      results.innerHTML = "<p style='color:#9ca3af'>Cargando juegos...</p>";

      try{
        const res = await fetch(API_URL, { cache: "no-store" });
        if(!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        if(!data || !Array.isArray(data.games)){
          throw new Error("Respuesta inválida: falta data.games[]");
        }

        GAMES = data.games;

        localStorage.setItem("gamesCache", JSON.stringify({ ts: Date.now(), games: GAMES }));
        results.innerHTML = "";
      }catch(err){
        console.error("Error loadGames:", err);

        const cache = JSON.parse(localStorage.getItem("gamesCache") || "null");
        if(cache && Array.isArray(cache.games) && cache.games.length){
          GAMES = cache.games;
          results.innerHTML = "<p style='color:#fbbf24'>⚠️ No pude leer Sheets. Usando caché local.</p>";
        }else{
          results.innerHTML = "<p style='color:#f87171'>❌ Error cargando juegos desde Google Sheets.</p>";
        }
      }
    }

    // ========= BUSCADOR (con imagen) =========
    search.addEventListener("input", ()=>{
      const q = (search.value || "").toLowerCase().trim();
      if(!q){ results.innerHTML=""; return; }

      if(!Array.isArray(GAMES) || GAMES.length===0){
        results.innerHTML = "<p style='color:#9ca3af'>Aún no cargo la lista…</p>";
        return;
      }

      const filtered = GAMES
        .filter(g => (g?.name || "").toLowerCase().includes(q))
        .slice(0, 30);

      results.innerHTML = filtered.map(g=>{
        const name = String(g?.name || "");
        const available = !!g?.available;
        const image = String(g?.image || "").trim();

        const safe = encodeURIComponent(name);

        const coverHtml = image
          ? `<img class="game-cover" src="${image}" alt="${escapeHtml(name)}" loading="lazy" decoding="async"
                 referrerpolicy="no-referrer"
                 onerror="this.outerHTML='<div class=&quot;game-placeholder&quot;></div>'">`
          : `<div class="game-placeholder"></div>`;

        return `
          <div class="result">
            <span class="game-left">
              ${coverHtml}
              <span class="game-name">${escapeHtml(name)}</span>
            </span>

            <span>
              <span class="${available ? "good":"bad"}">
                ${available ? "DISPONIBLE":"NO DISPONIBLE"}
              </span>
              ${available ? `<button onclick="addToCart(decodeURIComponent('${safe}'))">Agregar</button>` : ""}
            </span>
          </div>
        `;
      }).join("");
    });

    // ========= INICIO =========
    renderCart();
    if(cartOpen) openCart();
    loadGames();
  </script>

  <!-- Recomendado: atribución RAWG -->
  <div style="text-align:center;color:#9ca3af;padding:10px 0 90px 0;font-size:12px">
    Data & images from <a href="https://rawg.io" target="_blank" rel="noopener" style="color:#9ca3af">RAWG</a>
  </div>
</body>
</html>
