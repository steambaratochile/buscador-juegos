<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>SteamBaratoChile</title>

<style>
:root{--bg:#0b0f19;--card:#111827;--muted:#9ca3af;--text:#e5e7eb;--line:rgba(255,255,255,.08);--good:#16a34a;--bad:#dc2626;}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
.header{text-align:center;padding:40px 20px 10px 20px;}
.logo{width:120px;height:auto;margin-bottom:15px;}
.welcome{font-size:24px;font-weight:bold;margin-bottom:5px;}
.subtitle{color:var(--muted);margin-bottom:30px;}
.wrap{max-width:1100px;margin:auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;gap:20px;padding-bottom:90px;}
.card{background:var(--card);padding:20px;border-radius:16px;border:1px solid var(--line)}
input{width:100%;padding:14px;border-radius:12px;border:1px solid var(--line);background:#111;color:white;margin-bottom:10px;font-size:16px;}
#results{max-height:40vh;overflow-y:auto;margin-top:10px;}
.result{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);align-items:center;}
.result-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.game-cover{width:54px;height:54px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:#0f172a;}
.game-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.good{color:#22c55e;font-weight:bold}
.bad{color:#ef4444;font-weight:bold}
button{background:#1f2937;border:1px solid var(--line);color:white;padding:6px 10px;border-radius:8px;cursor:pointer}
button:hover{background:#374151}
.cart-fab{position:fixed;top:14px;right:14px;z-index:1000;width:44px;height:44px;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;background:#1f2937;border:1px solid var(--line);color:white;cursor:pointer;}
.cart-badge{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;padding:0 5px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#ef4444;color:white;}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(20px);background:#111827;color:white;border:1px solid rgba(255,255,255,.1);padding:10px 16px;border-radius:10px;font-size:14px;opacity:0;pointer-events:none;transition:all .25s ease;z-index:2000;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<body>

<div class="header">
<img src="logo.png" class="logo" alt="Logo">
<div class="welcome">Bienvenido a @steambaratochile</div>
<div class="subtitle">Busca tus juegos favoritos y agrégalos al carrito</div>
</div>

<div class="wrap">
<div class="card">
<input id="search" placeholder="Buscar juego...">
<div id="results"></div>
</div>
</div>

<button class="cart-fab">🛒</button>

<div id="toast" class="toast"></div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxKQgmgn16lNofJbtyMg_s3gjOD4tTo_BjRP70RbtuoucijvV0vsYtTk2yUlsg-RfEq/exec"

let GAMES=[]

const search=document.getElementById("search")
const results=document.getElementById("results")

function showToast(msg){
const t=document.getElementById("toast")
t.textContent=msg
t.classList.add("show")
setTimeout(()=>t.classList.remove("show"),2000)
}

async function loadGames(){

results.innerHTML="<p style='color:#9ca3af'>Cargando juegos...</p>"

const res=await fetch(API_URL)
const data=await res.json()

GAMES=data.games||[]

results.innerHTML=""

}

function escapeHtml(str){
return String(str)
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#039;")
}

search.addEventListener("input",()=>{

const q=(search.value||"").toLowerCase().trim()

if(!q){results.innerHTML="";return}

const filtered=GAMES
.filter(g=>(g?.name||"").toLowerCase().includes(q))
.slice(0,30)

results.innerHTML=filtered.map(g=>{

const name=String(g?.name||"")
const available=!!g?.available
const image=String(g?.image||"")

const img=image
? `<img class="game-cover" src="${image}" alt="${escapeHtml(name)}">`
: `<div class="game-cover"></div>`

return `
<div class="result">
<span class="result-left">
${img}
<span class="game-name">${escapeHtml(name)}</span>
</span>

<span class="${available?"good":"bad"}">
${available?"DISPONIBLE":"NO DISPONIBLE"}
</span>
</div>
`

}).join("")

})

loadGames()

</script>

</body>
</html>
