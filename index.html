<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SteamBaratoChile</title>

<style>
:root{--bg:#0b0f19;--card:#111827;--muted:#9ca3af;--text:#e5e7eb;--line:rgba(255,255,255,.08);--good:#16a34a;--bad:#dc2626;}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}

.header{
text-align:center;
padding:40px 20px 10px 20px;
}

.logo{
width:120px;
height:auto;
margin-bottom:15px;
}

.welcome{
font-size:24px;
font-weight:bold;
margin-bottom:5px;
}

.subtitle{
color:var(--muted);
margin-bottom:30px;
}

.wrap{max-width:1100px;margin:auto;padding:20px}

.card{background:var(--card);padding:20px;border-radius:16px;margin-bottom:20px;border:1px solid var(--line)}

input{width:100%;padding:14px;border-radius:12px;border:1px solid var(--line);background:#111;color:white;margin-bottom:15px}

.result{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)}

.good{color:#22c55e;font-weight:bold}
.bad{color:#ef4444;font-weight:bold}

button{background:#1f2937;border:1px solid var(--line);color:white;padding:6px 10px;border-radius:8px;cursor:pointer}
button:hover{background:#374151}

.cart-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line)}
</style>
</head>

<body>

<div class="header">
<img src="logo.png" class="logo" alt="Logo">
<div class="welcome">Bienvenido a @steambaratochile</div>
<div class="subtitle">Busca tus juegos favoritos y agrégalos al carrito</div>
</div>

<div class="wrap">

<div class="card">
<input id="search" placeholder="Buscar juego...">
<div id="results"></div>
</div>

<div class="card">
<h3>🛒 Carrito</h3>
<div id="cart"></div>
<button onclick="clearCart()">Vaciar carrito</button>
</div>

</div>

const search = document.getElementById("search");
const results = document.getElementById("results");
const cartDiv = document.getElementById("cart");

let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function saveCart(){localStorage.setItem("cart", JSON.stringify(cart));}

function renderCart(){
if(cart.length===0){cartDiv.innerHTML="<p>Carrito vacío</p>";return;}
cartDiv.innerHTML = cart.map((g,i)=>`
<div class="cart-item">
<span>${g}</span>
<button onclick="removeFromCart(${i})">Quitar</button>
</div>`).join("");
}

function removeFromCart(i){cart.splice(i,1);saveCart();renderCart();}
function clearCart(){cart=[];saveCart();renderCart();}

function addToCart(name){
if(cart.includes(name))return;
cart.push(name);
saveCart();
renderCart();
}

search.addEventListener("input",()=>{
const q = search.value.toLowerCase();
if(!q){results.innerHTML="";return;}
const filtered = GAMES.filter(g=>g.name.toLowerCase().includes(q)).slice(0,30);
results.innerHTML = filtered.map(g=>`
<div class="result">
<span>${g.name}</span>
<span>
<span class="${g.available ? "good":"bad"}">
${g.available ? "DISPONIBLE":"NO DISPONIBLE"}
</span>
${g.available ? `<button onclick="addToCart('${g.name.replace(/'/g,"\\'")}')">Agregar</button>` : ""}
</span>
</div>`).join("");
});

renderCart();
</script>
